name: PennyScout Deep Scans

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 7:00am ET — morning scan before market opens
    - cron: '0 22 * * 1-5'   # 6:00pm ET — evening scan after market closes
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  morning-scan:
    name: Morning Deep Scan (7am ET)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 11 * * 1-5'
    steps:
      - name: Trigger morning deep scan
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --max-time 360 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://penny-scout.vercel.app/api/scan/morning")
          cat /tmp/response.json
          if [ "$STATUS" != "200" ]; then
            echo "Morning scan returned HTTP $STATUS"
            exit 1
          fi
          echo "Morning scan completed successfully"

  evening-scan:
    name: Evening Deep Scan (6pm ET)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 22 * * 1-5'
    steps:
      - name: Trigger evening deep scan
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --max-time 360 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://penny-scout.vercel.app/api/scan/evening")
          cat /tmp/response.json
          if [ "$STATUS" != "200" ]; then
            echo "Evening scan returned HTTP $STATUS"
            exit 1
          fi
          echo "Evening scan completed successfully"
